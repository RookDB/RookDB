<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" width="100%" height="100%">
  <rect width="750" height="450" fill="#ffffff" rx="8" />
  
  <text x="375" y="40" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1f2937">Throughput Comparison: RookDB vs PostgreSQL 18</text>
  <text x="375" y="65" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#6b7280">Note: Logarithmic Scale (Base 10) due to Embedded vs Client-Server Architecture differences</text>

  <line x1="80" y1="100" x2="700" y2="100" stroke="#e5e7eb" stroke-width="1" />
  <text x="70" y="105" font-family="sans-serif" font-size="12" text-anchor="end" fill="#6b7280">100M</text>
  
  <line x1="80" y1="175" x2="700" y2="175" stroke="#e5e7eb" stroke-width="1" />
  <text x="70" y="180" font-family="sans-serif" font-size="12" text-anchor="end" fill="#6b7280">10M</text>

  <line x1="80" y1="250" x2="700" y2="250" stroke="#e5e7eb" stroke-width="1" />
  <text x="70" y="255" font-family="sans-serif" font-size="12" text-anchor="end" fill="#6b7280">1M</text>

  <line x1="80" y1="325" x2="700" y2="325" stroke="#e5e7eb" stroke-width="1" />
  <text x="70" y="330" font-family="sans-serif" font-size="12" text-anchor="end" fill="#6b7280">100k</text>

  <line x1="80" y1="400" x2="700" y2="400" stroke="#9ca3af" stroke-width="2" />
  <text x="70" y="405" font-family="sans-serif" font-size="12" text-anchor="end" fill="#6b7280">10k</text>

  <line x1="80" y1="100" x2="80" y2="400" stroke="#9ca3af" stroke-width="2" />

  <rect x="520" y="110" width="15" height="15" fill="#3b82f6" rx="2" />
  <text x="545" y="122" font-family="sans-serif" font-size="12" fill="#374151">RookDB (In-Memory)</text>
  <rect x="520" y="135" width="15" height="15" fill="#10b981" rx="2" />
  <text x="545" y="147" font-family="sans-serif" font-size="12" fill="#374151">PostgreSQL 18 (Network)</text>

  <rect x="120" y="135" width="40" height="265" fill="#3b82f6" rx="2" ry="2" /> <rect x="160" y="367" width="40" height="33" fill="#10b981" rx="2" ry="2" /> <text x="160" y="420" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">Numeric</text>
  <text x="160" y="435" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">Comparison</text>

  <rect x="260" y="174" width="40" height="226" fill="#3b82f6" rx="2" ry="2" /> <rect x="300" y="371" width="40" height="29" fill="#10b981" rx="2" ry="2" /> <text x="300" y="420" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">Numeric</text>
  <text x="300" y="435" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">Functions</text>

  <rect x="400" y="276" width="40" height="124" fill="#3b82f6" rx="2" ry="2" /> <rect x="440" y="373" width="40" height="27" fill="#10b981" rx="2" ry="2" /> <text x="440" y="420" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">String</text>
  <text x="440" y="435" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">Functions</text>

  <rect x="540" y="379" width="40" height="21" fill="#3b82f6" rx="2" ry="2" /> <rect x="580" y="379" width="40" height="21" fill="#10b981" rx="2" ry="2" /> <text x="580" y="420" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">Row</text>
  <text x="580" y="435" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">Roundtrip</text>
</svg>
