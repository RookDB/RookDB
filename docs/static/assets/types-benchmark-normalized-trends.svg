<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Normalized Throughput Trends Across Scales</title>
  <desc id="desc">Line chart comparing normalized throughput trends for three benchmark families across small, medium, and large scales.</desc>
  <rect x="0" y="0" width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="34" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#0f172a">Normalized Throughput Trends Across Scales</text>
  <text x="480" y="56" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#475569">Small workload baseline = 1.00 (standards-style trend comparison)</text>

  <line x1="120" y1="370" x2="870" y2="370" stroke="#334155" stroke-width="2"/>
  <line x1="120" y1="90" x2="120" y2="370" stroke="#334155" stroke-width="2"/>

  <line x1="120" y1="370" x2="870" y2="370" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="300" x2="870" y2="300" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="230" x2="870" y2="230" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="160" x2="870" y2="160" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="90" x2="870" y2="90" stroke="#cbd5e1" stroke-width="1"/>

  <text x="108" y="374" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">0.80</text>
  <text x="108" y="304" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">0.90</text>
  <text x="108" y="234" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">1.00</text>
  <text x="108" y="164" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">1.10</text>
  <text x="108" y="94" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">1.20</text>

  <text x="180" y="394" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#0f172a">Small</text>
  <text x="495" y="394" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#0f172a">Medium</text>
  <text x="810" y="394" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#0f172a">Large</text>

  <polyline points="180,230 495,286 810,139" fill="none" stroke="#0ea5e9" stroke-width="4"/>
  <circle cx="180" cy="230" r="5" fill="#0ea5e9"/>
  <circle cx="495" cy="286" r="5" fill="#0ea5e9"/>
  <circle cx="810" cy="139" r="5" fill="#0ea5e9"/>

  <polyline points="180,230 495,217 810,307" fill="none" stroke="#14b8a6" stroke-width="4"/>
  <circle cx="180" cy="230" r="5" fill="#14b8a6"/>
  <circle cx="495" cy="217" r="5" fill="#14b8a6"/>
  <circle cx="810" cy="307" r="5" fill="#14b8a6"/>

  <polyline points="180,230 495,209 810,223" fill="none" stroke="#f59e0b" stroke-width="4"/>
  <circle cx="180" cy="230" r="5" fill="#f59e0b"/>
  <circle cx="495" cy="209" r="5" fill="#f59e0b"/>
  <circle cx="810" cy="223" r="5" fill="#f59e0b"/>

  <rect x="615" y="92" width="235" height="92" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="630" y1="115" x2="662" y2="115" stroke="#0ea5e9" stroke-width="4"/>
  <text x="670" y="120" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">Numeric comparison</text>
  <line x1="630" y1="138" x2="662" y2="138" stroke="#14b8a6" stroke-width="4"/>
  <text x="670" y="143" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">Numeric functions</text>
  <line x1="630" y1="161" x2="662" y2="161" stroke="#f59e0b" stroke-width="4"/>
  <text x="670" y="166" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">Row round-trip</text>
</svg>
