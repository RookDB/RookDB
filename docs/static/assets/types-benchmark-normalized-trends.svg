<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Normalized Throughput Trends Across Scales</title>
  <desc id="desc">Line chart comparing normalized throughput trends for three benchmark families across small, medium, and large scales using median values from five runs.</desc>
  <rect x="0" y="0" width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="34" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#0f172a">Normalized Throughput Trends Across Scales</text>
  <text x="480" y="56" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#475569">Small workload baseline = 1.00 (median of 5 runs)</text>

  <line x1="120" y1="370" x2="870" y2="370" stroke="#334155" stroke-width="2"/>
  <line x1="120" y1="90" x2="120" y2="370" stroke="#334155" stroke-width="2"/>

  <line x1="120" y1="370" x2="870" y2="370" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="300" x2="870" y2="300" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="230" x2="870" y2="230" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="160" x2="870" y2="160" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="90" x2="870" y2="90" stroke="#cbd5e1" stroke-width="1"/>

  <text x="108" y="374" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">0.80</text>
  <text x="108" y="304" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">1.00</text>
  <text x="108" y="234" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">1.20</text>
  <text x="108" y="164" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">1.40</text>
  <text x="108" y="94" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">1.60</text>

  <text x="180" y="394" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#0f172a">Small</text>
  <text x="495" y="394" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#0f172a">Medium</text>
  <text x="810" y="394" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#0f172a">Large</text>

  <!-- numeric comparison: 1.00, 1.26, 1.37 -->
  <polyline points="180,300 495,208 810,170" fill="none" stroke="#0ea5e9" stroke-width="4"/>
  <circle cx="180" cy="300" r="5" fill="#0ea5e9"/>
  <circle cx="495" cy="208" r="5" fill="#0ea5e9"/>
  <circle cx="810" cy="170" r="5" fill="#0ea5e9"/>

  <!-- numeric functions: 1.00, 1.47, 1.54 -->
  <polyline points="180,300 495,136 810,112" fill="none" stroke="#14b8a6" stroke-width="4"/>
  <circle cx="180" cy="300" r="5" fill="#14b8a6"/>
  <circle cx="495" cy="136" r="5" fill="#14b8a6"/>
  <circle cx="810" cy="112" r="5" fill="#14b8a6"/>

  <!-- row roundtrip: 1.00, 0.96, 1.00 -->
  <polyline points="180,300 495,314 810,302" fill="none" stroke="#f59e0b" stroke-width="4"/>
  <circle cx="180" cy="300" r="5" fill="#f59e0b"/>
  <circle cx="495" cy="314" r="5" fill="#f59e0b"/>
  <circle cx="810" cy="302" r="5" fill="#f59e0b"/>

  <rect x="605" y="92" width="245" height="104" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="620" y1="115" x2="652" y2="115" stroke="#0ea5e9" stroke-width="4"/>
  <text x="660" y="120" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">Numeric comparison</text>
  <line x1="620" y1="140" x2="652" y2="140" stroke="#14b8a6" stroke-width="4"/>
  <text x="660" y="145" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">Numeric functions</text>
  <line x1="620" y1="165" x2="652" y2="165" stroke="#f59e0b" stroke-width="4"/>
  <text x="660" y="170" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">Row round-trip</text>
  <text x="620" y="188" font-family="Verdana, sans-serif" font-size="11" fill="#475569">Y axis: normalized median throughput</text>
</svg>
