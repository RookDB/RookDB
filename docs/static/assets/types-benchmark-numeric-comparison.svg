<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Numeric Comparison Throughput</title>
  <desc id="desc">Bar chart showing operations per second for small, medium, and large workloads.</desc>
  <rect x="0" y="0" width="900" height="420" fill="#f8fafc"/>
  <text x="450" y="34" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#0f172a">Numeric Comparison Throughput</text>
  <text x="450" y="58" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#475569">Higher is better (ops/sec)</text>

  <line x1="120" y1="340" x2="840" y2="340" stroke="#334155" stroke-width="2"/>
  <line x1="120" y1="90" x2="120" y2="340" stroke="#334155" stroke-width="2"/>

  <text x="110" y="342" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">0M</text>
  <text x="110" y="278" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">7M</text>
  <text x="110" y="214" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">14M</text>
  <text x="110" y="150" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">21M</text>
  <text x="110" y="96" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">28M</text>

  <line x1="120" y1="278" x2="840" y2="278" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="214" x2="840" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="150" x2="840" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="96" x2="840" y2="96" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="190" y="118" width="130" height="222" fill="#0ea5e9"/>
  <rect x="390" y="135" width="130" height="205" fill="#14b8a6"/>
  <rect x="590" y="90" width="130" height="250" fill="#f59e0b"/>

  <text x="255" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#0f172a">Small</text>
  <text x="455" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#0f172a">Medium</text>
  <text x="655" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#0f172a">Large</text>

  <text x="255" y="110" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">24.86M</text>
  <text x="455" y="127" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">22.95M</text>
  <text x="655" y="82" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">28.07M</text>
</svg>
