<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Typed Row Round-Trip Throughput</title>
  <desc id="desc">Bar chart showing rows per second for serialize plus deserialize round-trip workloads.</desc>
  <rect x="0" y="0" width="900" height="420" fill="#f8fafc"/>
  <text x="450" y="34" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#0f172a">Typed Row Round-Trip Throughput</text>
  <text x="450" y="58" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#475569">Rows/sec (serialize + deserialize)</text>

  <line x1="120" y1="340" x2="840" y2="340" stroke="#334155" stroke-width="2"/>
  <line x1="120" y1="90" x2="120" y2="340" stroke="#334155" stroke-width="2"/>

  <text x="110" y="342" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">0k</text>
  <text x="110" y="278" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">4k</text>
  <text x="110" y="214" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">8k</text>
  <text x="110" y="150" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">12k</text>
  <text x="110" y="96" text-anchor="end" font-family="Verdana, sans-serif" font-size="12" fill="#334155">17k</text>

  <line x1="120" y1="278" x2="840" y2="278" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="214" x2="840" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="150" x2="840" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="120" y1="96" x2="840" y2="96" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="190" y="96" width="130" height="244" fill="#0ea5e9"/>
  <rect x="390" y="94" width="130" height="246" fill="#14b8a6"/>
  <rect x="590" y="94" width="130" height="246" fill="#f59e0b"/>

  <text x="255" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#0f172a">Small</text>
  <text x="455" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#0f172a">Medium</text>
  <text x="655" y="360" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#0f172a">Large</text>

  <text x="255" y="88" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">16.58k</text>
  <text x="455" y="86" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">17.14k</text>
  <text x="655" y="86" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">16.81k</text>
</svg>
